name = "openresume-api"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "openresume-db"
database_id = "your-database-id"
migrations_dir = "../../packages/db/migrations"

# R2 bucket
[[r2_buckets]]
binding = "RESUME_PDFS"
bucket_name = "openresume-pdfs"

# KV namespace
[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-id"

# Queue
[[queues.producers]]
binding = "PDF_QUEUE"
queue = "openresume-pdf-queue"

[vars]
BETTER_AUTH_URL = "http://localhost:8787"

# Secrets (set via wrangler secret put)
# BETTER_AUTH_SECRET
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
# APPLE_CLIENT_ID
# APPLE_CLIENT_SECRET
# GEMINI_API_KEY
