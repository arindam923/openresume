name = "openresume-api"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

# D1 database
[[d1_databases]]
binding = "DB"
database_name = "openresume-db"
database_id = "09a701f7-1462-4c69-b97e-f2e256706c48"
migrations_dir = "../../packages/db/migrations"

[vars]
BETTER_AUTH_URL = "https://openresume-api.arindam92.workers.dev"

# Secrets are set via `wrangler secret put`:
#   BETTER_AUTH_SECRET (required, 32+ chars)
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET (optional)
#   GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET (optional)
#   APPLE_CLIENT_ID, APPLE_CLIENT_SECRET (optional)
#   GEMINI_API_KEY (optional — AI is BYOK)

